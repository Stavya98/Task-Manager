name: Flask CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    - name: 🐍 Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 📦 Install Dependencies
      run: |
        pip install -r backend/requirements.txt

    - name: 🧪 Run Tests
      run: |
        cd backend
        python -m pytest

    # 💀 THIS IS REAL CD
    - name: 🚀 Deploy to Render (ONLY if tests pass)
      if: success()
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}